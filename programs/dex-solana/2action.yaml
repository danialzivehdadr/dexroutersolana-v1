例2） 日本と中国以外の国の1日ごとの新規ユーザ数を取得
+get_g_a4_report_2:
  action>: GetGA4Report
  provider: ga_******
  propertyId: 12345
  startDate: '2023-03-01'
  endDate: '2023-03-03'
  metrics: newUsers
  dimensions: 'date, country'
  metricFilter: ''
  dimensionFilter:
    notExpression:
      filter:
        fieldName: country
        inListFilter:
          values:
            - Japan
            - China
  pageSize: 1000
  private: false
  meta:
    display:
      provider:
        type: chip
        label: 'Google Analytics (example@example.com)'
        icon: googleanalytics
